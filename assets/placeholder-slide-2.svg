<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500">
    <!-- Slide 2: Students -->
    <defs>
        <linearGradient id="gradient2" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1" />
            <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1" />
        </linearGradient>
    </defs>
    
    <!-- Background -->
    <rect width="1200" height="500" fill="url(#gradient2)"/>
    
    <!-- Classroom Wall -->
    <rect x="0" y="150" width="1200" height="350" fill="#F5F5DC" opacity="0.3"/>
    
    <!-- Whiteboard -->
    <rect x="50" y="100" width="300" height="150" fill="#90EE90" stroke="#333" stroke-width="2"/>
    <text x="200" y="160" font-family="Arial" font-size="24" text-anchor="middle" fill="#333">Excellence</text>
    <text x="200" y="195" font-family="Arial" font-size="24" text-anchor="middle" fill="#333">In Learning</text>
    
    <!-- Student 1 -->
    <circle cx="400" cy="180" r="25" fill="#FFD1DC"/>
    <ellipse cx="400" cy="230" rx="25" ry="35" fill="#FF69B4"/>
    <rect x="375" y="265" width="50" height="50" rx="10" fill="#FFB6C1"/>
    <circle cx="380" cy="170" r="8" fill="#333"/>
    
    <!-- Student 2 -->
    <circle cx="550" cy="180" r="25" fill="#FFD1DC"/>
    <ellipse cx="550" cy="230" rx="25" ry="35" fill="#4169E0"/>
    <rect x="525" y="265" width="50" height="50" rx="10" fill="#87CEEB"/>
    <circle cx="545" cy="170" r="8" fill="#333"/>
    
    <!-- Student 3 -->
    <circle cx="700" cy="180" r="25" fill="#FFD1DC"/>
    <ellipse cx="700" cy="230" rx="25" ry="35" fill="#FF6347"/>
    <rect x="675" y="265" width="50" height="50" rx="10" fill="#FFB6C1"/>
    <circle cx="695" cy="170" r="8" fill="#333"/>
    
    <!-- Student 4 -->
    <circle cx="850" cy="180" r="25" fill="#FFD1DC"/>
    <ellipse cx="850" cy="230" rx="25" ry="35" fill="#228B22"/>
    <rect x="825" y="265" width="50" height="50" rx="10" fill="#90EE90"/>
    <circle cx="845" cy="170" r="8" fill="#333"/>
    
    <!-- Books -->
    <g transform="translate(450, 350)">
        <rect x="0" y="0" width="30" height="50" fill="#FF0000" stroke="#333" stroke-width="1"/>
        <rect x="35" y="5" width="30" height="50" fill="#0000FF" stroke="#333" stroke-width="1"/>
        <rect x="70" y="0" width="30" height="50" fill="#228B22" stroke="#333" stroke-width="1"/>
    </g>
    
    <!-- Text -->
    <text x="600" y="450" font-family="Arial" font-size="32" font-weight="bold" text-anchor="middle" fill="#003DA5">
        Quality Education for All
    </text>
</svg>
